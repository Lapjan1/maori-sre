title:
  en: "Family Catches a Fish"
  mi: "Ka Hopu te Whānau i te Ika"
  af: "Familie Vang 'n Vis"

content:
  en: >
    The family goes to the river.
    The mother has a net.
    She catches a fish from the river.
    The fish is big.
    The family is happy.
  mi: >
    Ka haere te whānau ki te awa.
    Kei te whaea he kupenga.
    Ka hopu ia i tētahi ika i te awa.
    He nui te ika.
    Kei te koa te whānau.
  af: >
    Die familie gaan na die rivier.
    Die ma het 'n net.
    Sy vang 'n vis in die rivier.
    Die vis is groot.
    Die familie is bly.

