# River World — Experience 9
# Type: dialogue
# "Family Shares Food"
# Level 2 — Sharing, gratitude, social interaction

experience_id: RIVER_009
type: dialogue
level: 2

title:
  en: "Family Shares Food"
  mi: "Ka Tohatoha te Whānau i te Kai"
  af: "Familie Deel Kos"

content:
  en: >
    The food is ready.
    The mother calls the family.
    "Come and eat," she says.
    Everyone sits together.
    The mother shares the fish.
    The child eats.
    "This is delicious," says the child.
    The family is happy.
  mi: >
    Kua māoa te kai.
    Ka karanga te whaea ki te whānau.
    "Haere mai ki te kai," tāna.
    Ka noho tahi te katoa.
    Ka tohatoha te whaea i te ika.
    Ka kai te tamaiti.
    "He reka tēnei," e kī ana te tamaiti.
    Kei te koa te whānau.
  af: >
    Die kos is gereed.
    Die ma roep die familie.
    "Kom en eet," sê sy.
    Almal sit saam.
    Die ma deel die vis.
    Die kind eet.
    "Dit is heerlik," sê die kind.
    Die familie is bly.

