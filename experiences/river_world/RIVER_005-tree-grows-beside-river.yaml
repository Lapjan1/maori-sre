  mi: "Ka Tipu te Rākau i te Taha o te Awa"
  af: "Boom Groei Langs die Rivier"

content:
  en: >
    A tall tree grows beside the river.
    Its roots reach into the water.
    The tree drinks from the river.
    The tree grows tall and strong.
  mi: >
    Ka tipu tētahi rākau teitei i te taha o te awa.
    Ka toro atu ōna pakiaka ki te wai.
    Ka inu te rākau i te awa.
    Ka tupu teitei te rākau.
  af: >
    'n Groot boom groei langs die rivier.
    Sy wortels strek na die water.
    Die boom drink uit die rivier.
    Die boom groei lank en sterk.

