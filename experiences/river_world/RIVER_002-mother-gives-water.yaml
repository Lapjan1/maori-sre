title:
  en: "Mother Gives Water to the Child"
  mi: "Ka Hoatu te Whaea i te Wai ki te Tamaiti"
  af: "Ma Gee Water aan die Kind"

content:
  en: >
    The mother sees the child is thirsty.
    She takes a cup.
    She fills the cup with water from the river.
    She gives the cup to the child.
    The child drinks.
    The child is happy.
  mi: >
    Ka kite te whaea kei te matewai te tamaiti.
    Ka mau ia ki te kapu.
    Ka whakakiia e ia te kapu ki te wai mai i te awa.
    Ka hoatu e ia te kapu ki te tamaiti.
    Ka inu te tamaiti.
    Kei te koa te tamaiti.
  af: >
    Die ma sien die kind is dors.
    Sy vat 'n koppie.
    Sy vul die koppie met water uit die rivier.
    Sy gee die koppie aan die kind.
    Die kind drink.
    Die kind is bly.

