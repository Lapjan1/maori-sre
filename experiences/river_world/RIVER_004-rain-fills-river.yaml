content:
  en: >
    The sky is dark.
    Rain falls from the sky.
    The rain fills the river.
    The river rises.
    The water flows.
  mi: >
    He pōuri te rangi.
    Ka heke te ua i te rangi.
    Ka whakaki te ua i te awa.
    Ka piki te awa.
    Ka rere te wai.
  af: >
    Die lug is donker.
    Reën val uit die lug.
    Die reën vul die rivier.
    Die rivier styg.
    Die water vloei.

