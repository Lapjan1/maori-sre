  en: "Family Cooks the Fish"
  mi: "Ka Tunu te Whānau i te Ika"
  af: "Familie Kook die Vis"

content:
  en: >
    The family makes a fire.
    They clean the fish.
    They cook the fish over the fire.
    The fish smells good.
  mi: >
    Ka tahu te whānau i te ahi.
    Ka horoi rātou i te ika.
    Ka tunu rātou i te ika ki te ahi.
    He kakara reka te ika.
  af: >
    Die familie maak 'n vuur.
    Hulle maak die vis skoon.
    Hulle kook die vis oor die vuur.
    Die vis ruik lekker.

