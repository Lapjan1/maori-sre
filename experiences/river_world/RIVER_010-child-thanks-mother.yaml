# River World — Experience 10
# Type: story
# "The Child Thanks the Mother"
# Level 1 — Gratitude, emotion, family bonds

experience_id: RIVER_010
type: story
level: 1

title:
  en: "The Child Thanks the Mother"
  mi: "Ka Whakawhetai te Tamaiti ki te Whaea"
  af: "Die Kind Bedank die Ma"

content:
  en: >
    The child is full.
    The child looks at the mother.
    "Thank you, Mother, for the food," says the child.
    The mother smiles.
    "You are welcome, my child," she says.
    The family is together.
  mi: >
    Kua mākona te tamaiti.
    Ka titiro te tamaiti ki te whaea.
    "Ngā mihi e te whaea mō te kai," e kī ana te tamaiti.
    Ka kata te whaea.
    "Ko tēnei te whakautu, e taku tamaiti," tāna.
    Kei te noho tahi te whānau.
  af: >
    Die kind is versadig.
    Die kind kyk na die ma.
    "Dankie, Ma, vir die kos," sê die kind.
    Die ma glimlag.
    "Jy is welkom, my kind," sê sy.
    Die familie is saam.

