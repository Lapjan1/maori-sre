title:
  en: "Wash Your Hands"
  mi: "Horoi Ō Ringa"
  af: "Was Jou Hande"

content:
  en: >
    Before you eat, wash your hands.
    First, turn on the water.
    Then, use soap.
    Rub your hands together.
    Rinse with water.
    Dry your hands.
    Now you can eat.
  mi: >
    I mua i te kai, horoi ō ringa.
    Tuatahi, whakatuwhera te wai.
    Kātahi, whakamahia te hopi.
    Mirimiri ō ringa.
    Horoi ki te wai.
    Whakamaroke ō ringa.
    Ināianei, taea e koe te kai.
  af: >
    Voor jy eet, was jou hande.
    Eerste, draai die water oop.
    Dan, gebruik seep.
    Vryf jou hande saam.
    Spoel met water.
    Droog jou hande.
    Nou kan jy eet.

