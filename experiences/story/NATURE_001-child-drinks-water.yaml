title:
  en: "The Child Drinks Water"
  mi: "Ka Inu te Tamaiti i te Wai"
  af: "Die Kind Drink Water"

content:
  en: >
    A child walks to the river.
    The child is thirsty.
    The child drinks water from the river.
    Now the child is not thirsty.
  mi: >
    Ka hīkoi te tamaiti ki te awa.
    Kei te matewai te tamaiti.
    Ka inu te tamaiti i te wai mai i te awa.
    Kāore te tamaiti i te matewai ināianei.
  af: >
    'n Kind loop na die rivier.
    Die kind is dors.
    Die kind drink water uit die rivier.
    Nou is die kind nie dors nie.

