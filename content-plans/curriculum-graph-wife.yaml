  scaffolding:
    rehearsal_model:
      current: "open-ended prompt"
      recommended: "staged: situation → understand → choose intent → speak"
      example:
        situation: "Family member says 'Kia ora!'"
        stage_1_understand:
          prompt: "What did they say?"
          options: ["Hello", "Goodbye", "I'm hungry"]
        stage_2_choose:
          prompt: "What do you want to do?"
          options: ["Say hello back", "Ask how they are", "Walk away"]
        stage_3_speak:
          prompt: "Now say it in Māori"
          target: "Kia ora"

  metadata:
    generated_from: "pass1-results.json + visit-aotearoa-course-v2.yaml"
    say_with_duplicates_removed: 52  # VISIT_WHERE_FROM and VISIT_BEAUTIFUL_HOUSE appear twice in Say
    recognize: 1
