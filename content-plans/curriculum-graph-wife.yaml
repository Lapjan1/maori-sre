        - order: 39
          phrase: VISIT_GOOD_FOOD
          context: "say food is good"
        - order: 40
          phrase: VISIT_HOW_OLD
          context: "ask someone's age"

        # Thanking extended
        - order: 41
          phrase: VISIT_THANK_HOST
          context: "thank for hospitality"
        - order: 42
