# Curriculum Graph — Generated from Learner Profile + Reusable Course
# Generated 2026-07-21
#
# Takes the wife's 54 Say targets and orders them into a progressive
# learning sequence using: prerequisites → semantic reuse → difficulty → context

curriculum:
  learner_id: wife_nz_visit_001
  course_id: visit_to_aotearoa
  total_say_targets: 54

  tiers:
    core:
      description: "Essential for the trip — learn these first"
      count: 20
      rationale: "Cover every basic interaction: greet, introduce, ask, thank, goodbye"
      sequence:
        # Arrival — the very first interaction
        - order: 1
          phrase: VISIT_KIA_ORA
          context: "greet anyone, anytime"
        - order: 2
          phrase: VISIT_HOW_ARE_YOU
          context: "initiate conversation"
        - order: 3
          phrase: VISIT_I_AM_WELL
          context: "respond to greeting"
        - order: 4
          phrase: VISIT_WELCOME
          context: "welcome / acknowledge arrival"

        # Introductions
        - order: 5
          phrase: VISIT_MY_NAME
          context: "introduce yourself"
        - order: 6
          phrase: VISIT_WHERE_FROM
          context: "ask where someone is from"
        - order: 7
          phrase: VISIT_FROM_SA
          context: "say where you are from"
        - order: 8
          phrase: VISIT_GREET_ALL
          context: "greet a group formally"

        # Basic needs
        - order: 9
          phrase: VISIT_WHERE_BATHROOM
          context: "essential location question"
        - order: 10
          phrase: VISIT_PLEASE_SIT
          context: "respond to host offering seat"
        - order: 11
          phrase: VISIT_HUNGRY
          context: "express need at meal time"
        - order: 12
          phrase: VISIT_THIRSTY
          context: "express need at meal time"
        - order: 13
          phrase: VISIT_WATER_PLEASE
          context: "polite request"
        - order: 14
          phrase: VISIT_THANK_FOOD
          context: "essential gratitude before/after meals"

        # Goodbye
        - order: 15
          phrase: VISIT_GOODBYE_STAY
          context: "say goodbye to those staying"
        - order: 16
          phrase: VISIT_GOODBYE_LEAVE
          context: "say goodbye as one leaving"
        - order: 17
          phrase: VISIT_WILL_RETURN
          context: "promise to return — important for family"
        - order: 18
          phrase: VISIT_BE_STRONG
          context: "give encouragement on departure"

        # Social essentials
        - order: 19
          phrase: VISIT_DELICIOUS
          context: "compliment food"
        - order: 20
          phrase: VISIT_BEAUTIFUL_HOUSE
          context: "compliment the home"

    active:
      description: "Wants to say these — expand conversational range"
      count: 24
      rationale: "Builds on core with richer expressions across all scenarios"
      sequence:
        # Food and drink (extended)
        - order: 21
          phrase: VISIT_FOOD_PLEASE
          context: "polite food request"
        - order: 22
          phrase: VISIT_HELP_YOURSELVES
          context: "offer food to others at table"

