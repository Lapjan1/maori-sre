        - order: 24
          phrase: VISIT_FINE_DAY
          context: "comment on good weather"
        - order: 25
          phrase: VISIT_HOT
          context: "say it is hot"
        - order: 26
          phrase: VISIT_COLD
          context: "say it is cold"
        - order: 27
