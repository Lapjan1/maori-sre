    - id: SHOP
      category: PLACE
      label: { en: "shop", mi: "toa", af: "winkel" }
    - id: MARAE
      category: PLACE
      label: { en: "community centre", mi: "marae", af: "gemeenskapsentrum" }
    - id: BEACH
      category: PLACE
      label: { en: "beach", mi: "one", af: "strand" }
    - id: SEA
      category: PLACE
      label: { en: "sea", mi: "moana", af: "see" }
    - id: TAONGA
      category: THING
      label: { en: "gift/treasure", mi: "taonga", af: "geskenk" }
    - id: FOOD
      category: THING
      label: { en: "food", mi: "kai", af: "kos" }
    - id: WATER
      category: THING
      label: { en: "water", mi: "wai", af: "water" }
    - id: BREAD
      category: THING
      label: { en: "bread", mi: "parāoa", af: "brood" }
    - id: MILK
      category: THING
      label: { en: "milk", mi: "miraka", af: "melk" }
    - id: CAR
      category: THING
      label: { en: "car", mi: "motokā", af: "motor" }
    - id: HAERE
      category: ACTION
      label: { en: "go/travel", mi: "haere", af: "gaan" }
    - id: HOKI
      category: ACTION
      label: { en: "return", mi: "hoki mai", af: "terugkom" }
    - id: KORERO
      category: ACTION
      label: { en: "talk/speak", mi: "kōrero", af: "praat" }
    - id: WAIATA
