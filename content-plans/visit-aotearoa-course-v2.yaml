# Te Haerenga ki Aotearoa — Course Specification v2
# Status: REUSABLE SEMANTIC CORE
#
# This file defines the reusable course content only.
# Learner goals are in learner-profile-*.yaml.
# Review status is preserved to track native-speaker verification.

course:
  id: visit_to_aotearoa
  title: "Te Haerenga ki Aotearoa — First Visit to New Zealand"
  description: "A 12-experience beginner course for an Afrikaans-speaking adult visiting Māori family in Aotearoa"
  language: mi
  bridge_language: af

  semantic_concepts:
    - id: TRAVELLER
      category: PERSON
      definition: "the person undertaking the journey"
    - id: FAMILY_MEMBER
      category: PERSON
      definition: "a member of the host family"
    - id: WHANAU
      category: PERSON
      definition: "family / extended family"
      label: { en: "family", mi: "whānau", af: "familie" }
    - id: MOTHER
      category: PERSON
      definition: "mother or maternal figure"
      label: { en: "mother", mi: "whaea", af: "ma" }
    - id: FATHER
      category: PERSON
      definition: "father or paternal figure"
      label: { en: "father", mi: "matua", af: "pa" }
    - id: GRANDMOTHER
      category: PERSON
      label: { en: "grandmother", mi: "kuia", af: "ouma" }
    - id: GRANDFATHER
      category: PERSON
      label: { en: "grandfather", mi: "koroua", af: "oupa" }
    - id: CHILDREN
      category: PERSON
      label: { en: "children", mi: "tamariki", af: "kinders" }
    - id: ELDER
      category: PERSON
      label: { en: "elder", mi: "kaumātua", af: "oudste" }
    - id: AOTEAROA
      category: PLACE
      label: { en: "New Zealand", mi: "Aotearoa", af: "Nieu-Seeland" }
    - id: BATHROOM
      category: PLACE
      label: { en: "bathroom", mi: "wharepaku", af: "badkamer" }
    - id: KITCHEN
